dependencies:
  tools:
    - type: "mcp"
      value: "secure-mcp-server"
      description: "Sysdig MCP server — provides list_posture_resource_kinds, get_posture_resource_template, test_posture_rego, list_posture_controls, list_posture_policies, and get_customer_settings (used as the availability probe)."
      transport: "streamable_http"
      url: "${SYSDIG_MCP_SERVER_URL}"
      headers:
        Authorization: "Bearer ${SYSDIG_SECURE_API_TOKEN}"
        X-Sysdig-Host: "${SYSDIG_SECURE_URL}"
