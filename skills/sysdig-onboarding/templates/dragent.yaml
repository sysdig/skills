# Sysdig Host Shield Configuration
# Generated by sysdig-onboarding skill
# Replace {{PLACEHOLDER}} values before deploying
#
# Location: /etc/sysdig/dragent.yaml
# Restart after editing: systemctl restart dragent

customerid: "{{SYSDIG_ACCESS_KEY}}"
collector: "{{COLLECTOR_ENDPOINT}}"
collector_port: 6443
ssl: true

tags: "role:{{HOST_ROLE}},env:{{ENVIRONMENT}}"

# === RUNTIME ===
security:
  enabled: true
  k8s_audit_server_enabled: false
# === END RUNTIME ===

# === FIM ===
security:
  fim:
    enabled: true
    paths:
      - /etc
      - /usr/bin
      - /usr/sbin
      - /boot
# === END FIM ===

# === HOST_SCANNING ===
host_scanner:
  enabled: true
# === END HOST_SCANNING ===

# Performance tuning
# sampling_ratio: 1
# log:
#   file_priority: info
#   console_priority: warning
