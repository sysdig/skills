# Sysdig Shield — Kubernetes Onboarding
# Generated by sysdig-onboarding skill
# Chart: sysdig/shield (https://charts.sysdig.com)
#
# Replace {{PLACEHOLDER}} values before installing.
# Features are pre-set to disabled. The skill flips enabled: true for
# selected features based on the user's profile choice.
#
# Install:
#   helm upgrade --install --create-namespace \
#     -n sysdig-agent -f values.yaml sysdig sysdig/shield
#
# Upgrade:
#   helm upgrade sysdig sysdig/shield -n sysdig-agent -f values.yaml

# --- Cluster Identity ---
cluster_config:
  name: "{{CLUSTER_NAME}}"
  cluster_type: "{{CLUSTER_TYPE}}"    # generic | gke-autopilot

# --- Sysdig Connection ---
# IMPORTANT: This is the Agent Access Key (Settings → Agent Keys),
# NOT the Secure API Token. They are different credentials.
sysdig_endpoint:
  region: "{{SYSDIG_REGION}}"         # us1, us2, us4, eu1, eu2, au1, in1, me2
  access_key: "REPLACE_WITH_YOUR_SYSDIG_AGENT_ACCESS_KEY"

# --- Features ---
# Each feature marker is independent — toggle any combination.
features:
  # Always enabled — required for cluster visibility in Sysdig UI
  kubernetes_metadata:
    enabled: true

  detections:
    # === KUBERNETES_AUDIT ===
    # K8s API server audit trail for threat detection (cluster component)
    kubernetes_audit:
      enabled: false
    # === END KUBERNETES_AUDIT ===
    # === DRIFT_CONTROL ===
    # Detect filesystem changes in running containers (Host Shield)
    drift_control:
      enabled: false
    # === END DRIFT_CONTROL ===
    # === MALWARE_CONTROL ===
    # Detect known malware in containers (Host Shield)
    malware_control:
      enabled: false
    # === END MALWARE_CONTROL ===
    # === FILE_INTEGRITY_MONITORING ===
    # Monitor critical file changes on hosts (Host Shield)
    file_integrity_monitoring:
      enabled: false
    # === END FILE_INTEGRITY_MONITORING ===

  # === ADMISSION_CONTROL ===
  # Block non-compliant deployments at deploy time (cluster component)
  admission_control:
    enabled: false
    dry_run: true
    failure_policy: Ignore
  # === END ADMISSION_CONTROL ===

  posture:
    # === CLUSTER_POSTURE ===
    # CIS benchmark compliance scanning (cluster component)
    cluster_posture:
      enabled: false
    # === END CLUSTER_POSTURE ===
    # === HOST_POSTURE ===
    # Host-level CIS benchmarks (Host Shield)
    host_posture:
      enabled: false
    # === END HOST_POSTURE ===

  vulnerability_management:
    # === CONTAINER_VULN_MGMT ===
    # Scan running container images for vulnerabilities (cluster component)
    container_vulnerability_management:
      enabled: false
    # === END CONTAINER_VULN_MGMT ===
    # === HOST_VULN_MGMT ===
    # Scan host OS packages for vulnerabilities (Host Shield)
    host_vulnerability_management:
      enabled: false
    # === END HOST_VULN_MGMT ===

  investigations:
    # === ACTIVITY_AUDIT ===
    # Audit trail of container/host activity (Host Shield)
    activity_audit:
      enabled: false
    # === END ACTIVITY_AUDIT ===
    # === LIVE_LOGS ===
    # Stream container logs in Sysdig UI (Host Shield)
    live_logs:
      enabled: false
    # === END LIVE_LOGS ===
    # === NETWORK_SECURITY ===
    # Network policy generation and enforcement (Host Shield)
    network_security:
      enabled: false
    # === END NETWORK_SECURITY ===
    # === CAPTURES ===
    # System call capture for forensics (Host Shield)
    captures:
      enabled: false
    # === END CAPTURES ===

  # === RAPID_RESPONSE ===
  # Live container investigation and automated response (Host Shield)
  respond:
    rapid_response:
      enabled: false
    response_actions:
      enabled: false
  # === END RAPID_RESPONSE ===

# --- Host Shield Configuration ---
host:
  driver: "{{HOST_DRIVER}}"           # kmod | universal_ebpf | legacy_ebpf
  privileged: true                    # Set false for GKE Autopilot (disables posture & vuln mgmt)
  # === AIRGAP ===
  # Uncomment for air-gapped / private registry clusters
  # image:
  #   registry: "{{PRIVATE_REGISTRY}}"
  # === END AIRGAP ===

# === AIRGAP_CLUSTER ===
# Uncomment for air-gapped / private registry clusters
# cluster:
#   image:
#     registry: "{{PRIVATE_REGISTRY}}"
# === END AIRGAP_CLUSTER ===

# === PROXY ===
# Uncomment and configure if the cluster uses an HTTP proxy
# proxy:
#   http_proxy: "{{HTTP_PROXY}}"
#   https_proxy: "{{HTTPS_PROXY}}"
#   no_proxy: "{{NO_PROXY}}"
# === END PROXY ===

# === CUSTOM_CA ===
# Uncomment and configure if custom CA certificates are needed
# ssl:
#   verify: true
#   ca:
#     certs:
#       - |
#         {{CA_CERTIFICATE_PEM}}
# === END CUSTOM_CA ===
